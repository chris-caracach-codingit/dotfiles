# ---------------------------------------------------------------------------
# Terminal & colors
# ---------------------------------------------------------------------------

# Advertise 256-color support inside tmux
set -g default-terminal "tmux-256color"
# Enable true color (24-bit RGB) when the outer terminal is xterm-256color
set -ag terminal-overrides ",xterm-256color:RGB"

# Use fish as the shell for new windows/panes
set -g default-shell "/usr/bin/fish"

# ---------------------------------------------------------------------------
# Prefix key
# ---------------------------------------------------------------------------

# Use Alt+Space as the prefix instead of the default Ctrl+b
set -g prefix M-space
unbind C-b
# Pressing prefix twice sends a literal Alt+Space to the program in the pane
bind-key M-space send-prefix

# ---------------------------------------------------------------------------
# Windows & panes
# ---------------------------------------------------------------------------

# Number windows and panes starting at 1 instead of 0 (matches keyboard layout)
set -g base-index 1
set -g pane-base-index 1
# Renumber remaining windows when one is closed (no gaps in the numbering)
set -g renumber-windows on

# ---------------------------------------------------------------------------
# Plugins (managed by tpm — tmux plugin manager)
# ---------------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# CPU and memory usage display for the status bar
set -g @plugin 'hendrikmi/tmux-cpu-mem-monitor'

# Enable mouse support: click to select panes/windows, drag to resize, scroll
set -g mouse on

# ---------------------------------------------------------------------------
# Status bar
# ---------------------------------------------------------------------------

# Show the session name on the left; background turns red while the prefix
# key is active (visual feedback that tmux is waiting for a command)
set -g status-left "#[bg=#{?client_prefix,red,blue}] session[#S] "
set -g status-left-length 100
# Dark slate background for the whole status bar
set -g status-style "bg=#394253"

# Window list: "number:name", with the active window highlighted in light blue
set -g window-status-format "#I:#W"
set -g window-status-current-format "#[fg=#88C0D0]  #I:#W"

# Put the status bar at the top of the screen instead of the bottom
set -g status-position top

# ---------------------------------------------------------------------------
# Key bindings (all use the prefix: Alt+Space, then the key)
# ---------------------------------------------------------------------------

# Split panes with | (vertical divider) and - (horizontal divider)
# instead of the default % and "
unbind %
bind | split-window -h

unbind '"'
bind '-' split-window -v

# prefix + r reloads this config file
unbind r
bind r source-file ~/.tmux.conf

# Resize panes with vim-style h/j/k/l (5 cells per press)
bind h resize-pane -L 5
bind j resize-pane -D 5
bind k resize-pane -U 5
bind l resize-pane -R 5
# prefix + m toggles zoom (maximize/restore) for the current pane;
# -r makes it repeatable without pressing the prefix again
bind -r m resize-pane -Z

# Initialize tpm — must stay at the very bottom of the file
run '~/.tmux/plugins/tpm/tpm'
